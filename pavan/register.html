<html>

<head>

    <title>Register</title>
    <link rel="icon" type="image/png" href="YouTube 2.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200');

            background-size: cover;
            background-position: center;
        }

        .register-box {
            width: 380px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 0 25px #ff0066;
        }

        .register-box h1 {
            text-align: center;
            color: #ff0066;
            margin-bottom: 25px;
            font-size: 45px;
        }

        .input-box {
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: #111;
            color: white;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: #ff0066;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .btn:hover {
            box-shadow: 0 0 20px #ff0066;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: white;
        }

        .login-link a {
            color: cyan;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="register-box">

        <h1>Register</h1>

        <div class="input-box">
            <input type="text" placeholder="Full Name">
        </div>

        <div class="input-box">
            <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <a href="YouTube Creator Helper.html"><button class="btn">Create Account</button></a>

        <div class="login-link">
            Already have account?
            <a href="login.html">Login</a>
        </div>

    </div>

</body>

</html>
