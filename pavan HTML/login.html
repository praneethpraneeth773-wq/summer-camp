<html>

<head>

    <title>Creator Helper - Login</title>
    <link rel="icon" type="image/png" href="YouTube 2.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            width: 350px;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 25px #ff0055;
            text-align: center;
        }

        .login-box h1 {
            color: #ff0055;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: #111;
            color: white;
            font-size: 16px;
        }

        .input-box input:focus {
            border: 2px solid #ff0055;
            box-shadow: 0 0 10px #ff0055;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: #ff0055;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #ff3377;
            box-shadow: 0 0 20px #ff0055;
        }

        .extra {
            margin-top: 20px;
            color: #ccc;
            font-size: 14px;
        }

        .extra a {
            color: #00e5ff;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h1>Login</h1>

        <div class="input-box">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <a href="YouTube Creator Helper.html"><button class="login-btn">Login</button></a>

        <div class="extra">
            Don't have an account?
            <a href="register.html">Register</a>
        </div>
    </div>

</body>

</html>
